name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - run: mvn package -DskipTests -B

      - run: cp target/shoppingmall.war target/ROOT.war

      - run: gh release delete latest --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: gh release create latest target/ROOT.war --title "Latest Build" --notes "Built from ${{ github.sha }}" --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
